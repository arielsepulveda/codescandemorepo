# Reference workflow showing how to plug Accenture CodeScan into CI as a
# webhook-driven scan. NOT enabled by default — fill in the secrets and
# rename to `codescan.yml` once your CodeScan API is reachable.

name: CodeScan
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # so the bot can post review comments

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CodeScan
        env:
          CODESCAN_URL:   ${{ secrets.CODESCAN_URL }}     # https://codescan.acme.local
          CODESCAN_TOKEN: ${{ secrets.CODESCAN_TOKEN }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --arg taskflow "accenture_codescan.taskflows.azure_full_stack_audit" \
            --arg git_url   "${{ github.server_url }}/${{ github.repository }}.git" \
            --arg git_ref   "${{ github.event.pull_request.head.ref || github.ref_name }}" \
            --arg tenant_id "demo" \
            --arg repo_id   "${{ github.repository }}" \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            '{taskflow:$taskflow, git_url:$git_url, git_ref:$git_ref,
              tenant_id:$tenant_id, repo_id:$repo_id,
              pr_number:($pr_number | tonumber? // null)}')
          curl -fsS -X POST "$CODESCAN_URL/scans" \
               -H "Authorization: Bearer $CODESCAN_TOKEN" \
               -H "Content-Type: application/json" \
               -d "$payload"
